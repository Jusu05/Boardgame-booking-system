<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %}</title>
  {% block head %}{% endblock %}
</head>

<body>
<header class="nav-header">
  <div class="nav-inner">
    <a href="/" class="brand">Lautapeli varaamo</a>
    <nav id="nav" class="nav" aria-label="Main navigation">
      <ul class="nav-list">
        {% if username %}
        <li><a href="/user" class="nav-link">{{ username }}</a></li>
        <li><a href="/add_boardgame" class="nav-link">lisää peli</a></li>
        {% else %}
        <li><a href="/login" class="nav-link">Kirjaudu sisään</a></li>
        {% endif %}
      </ul>
    </nav>
  </div>
</header>

{% block content %}{% endblock %}

</body>
</html>
